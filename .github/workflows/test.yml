# ============================================================
# Tirthing CI — Run tests and build on every push to main
# ============================================================
# Blocks merge if any step fails (tests, lint, build).
# Runs on Ubuntu to match Render's deployment environment.
# ============================================================

name: CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: install, test ─────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run engine unit tests
        run: npx jest tests/engine.test.js --forceExit --detectOpenHandles
        env:
          NODE_OPTIONS: --experimental-vm-modules

  # ── Frontend: install, build ───────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com/api
